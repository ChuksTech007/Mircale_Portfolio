<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Miracle Okpala</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, sans-serif;
      background: radial-gradient(circle at top, #62D4B7 0%, rgba(98,212,183,0.16) 20%, transparent 48%),
                  linear-gradient(180deg, #091A34 0%, #081E3E 100%);
      color: #F7F8FC;
    }
    .message-card {
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 32px;
      padding: 3rem;
      text-align: center;
      box-shadow: 0 24px 60px rgba(1,13,37,0.18);
      backdrop-filter: blur(18px);
    }
    .message-card h1 {
      margin-bottom: 1rem;
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      letter-spacing: -0.04em;
    }
    .message-card p {
      color: rgba(247,248,252,0.82);
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .button-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 2rem;
      border-radius: 999px;
      background: #FFC56D;
      color: #10213C;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease;
    }
    .button-back:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="message-card">
    <h1>Message sent!</h1>
    <p>Thank you for reaching out. Your message has been sent successfully, and I’ll get back to you shortly.</p>
    <a class="button-back" href="index.html">Return to portfolio</a>
  </div>
</body>
</html>
